spring.application.name=hy-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:postgres}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.defaultModelsExpandDepth=-1

app.qr.secret=${APP_QR_SECRET:hy-platform-qr-secret}
app.notifications.processor.cron=${APP_NOTIFICATIONS_PROCESSOR_CRON:0 */1 * * * *}
app.notifications.processor.batch-size=${APP_NOTIFICATIONS_PROCESSOR_BATCH_SIZE:100}
